<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Random Movie Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:25px;
}

.movie{
    font-size:36px;
    font-weight:700;
    min-height:100px;
    display:flex;
    align-items:center;
    justify-content:center;
    word-break:break-word;
    padding:20px;
}

.buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    font-size:16px;
}

.copy{
    background:#16a34a;
    color:white;
}

.next{
    background:#2563eb;
    color:white;
}

.reload{
    background:#ea580c;
    color:white;
}

.stats{
    margin-top:20px;
    color:#94a3b8;
    font-size:14px;
}

.history{
    margin-top:30px;
    text-align:left;
}

.history h3{
    margin-bottom:10px;
}

.history-item{
    padding:8px 0;
    border-bottom:1px solid #334155;
    color:#cbd5e1;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    color:white;
    padding:12px 18px;
    border-radius:10px;
    display:none;
    z-index:999;
}

.loading{
    color:#fbbf24;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>🎬 Random Movie Generator</h1>

        <div class="subtitle">
            30,000+ Movies • No API Key Required
        </div>

        <div id="movie" class="movie loading">
            Loading Movie Database...
        </div>

        <div class="buttons">

            <button class="copy" onclick="copyMovie()">
                📋 Copy Movie
            </button>

            <button class="next" onclick="nextMovie()">
                🎲 Next Movie
            </button>

            <button class="reload" onclick="reloadMoviePool()">
                🔄 Refresh
            </button>

        </div>

        <div class="stats" id="stats">
            Loading...
        </div>

        <div class="history">

            <h3>Recent Movies</h3>

            <div id="history"></div>

        </div>

    </div>

</div>

<div id="toast" class="toast"></div>

<script>

const DATA_URL =
"https://raw.githubusercontent.com/prust/wikipedia-movie-data/master/movies.json";

let movies = [];
let currentMovie = null;

let recent =
JSON.parse(
    localStorage.getItem("movie_history") || "[]"
);

function showToast(msg){

    const toast =
        document.getElementById("toast");

    toast.textContent = msg;
    toast.style.display = "block";

    setTimeout(()=>{
        toast.style.display = "none";
    },1500);
}

function updateHistory(){

    const box =
        document.getElementById("history");

    box.innerHTML = "";

    [...recent]
    .reverse()
    .slice(0,10)
    .forEach(movie=>{

        const div =
            document.createElement("div");

        div.className =
            "history-item";

        div.textContent =
            movie;

        box.appendChild(div);

    });
}

function saveHistory(){

    localStorage.setItem(
        "movie_history",
        JSON.stringify(recent)
    );
}

function updateStats(){

    document.getElementById("stats")
    .innerHTML =
        `Movies Loaded: ${movies.length.toLocaleString()} |
         Recent Cache: ${recent.length}/50`;
}

function randomItem(arr){

    return arr[
        Math.floor(
            Math.random()*arr.length
        )
    ];
}

function nextMovie(){

    if(!movies.length){
        return;
    }

    const recentSet =
        new Set(recent);

    let pool =
        movies.filter(
            m => !recentSet.has(m)
        );

    if(pool.length === 0){

        recent = [];

        saveHistory();

        pool = movies;
    }

    currentMovie =
        randomItem(pool);

    document.getElementById("movie")
    .textContent =
        currentMovie;

    recent.push(currentMovie);

    if(recent.length > 50){
        recent.shift();
    }

    saveHistory();

    updateHistory();
    updateStats();
}

async function copyMovie(){

    if(!currentMovie){
        return;
    }

    await navigator.clipboard.writeText(
        currentMovie
    );

    showToast(
        "Copied: " + currentMovie
    );
}

async function loadMovies(){

    try{

        const res =
            await fetch(DATA_URL);

        const data =
            await res.json();

        const unique =
            new Set();

        data.forEach(movie=>{

            if(movie.title){

                unique.add(
                    movie.title.trim()
                );

            }

        });

        movies =
            Array.from(unique);

        document
        .getElementById("movie")
        .classList
        .remove("loading");

        updateStats();

        nextMovie();

    }catch(err){

        console.error(err);

        document
        .getElementById("movie")
        .textContent =
        "Failed to load movie database";
    }
}

async function reloadMoviePool(){

    recent = [];

    saveHistory();

    nextMovie();

    showToast(
        "History Cleared"
    );
}

updateHistory();
loadMovies();

</script>

</body>
</html>
