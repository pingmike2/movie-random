<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎬 Random Movie Copy</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:700px;
    background:#1e293b;
    border-radius:20px;
    padding:40px;
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.movie{
    font-size:38px;
    font-weight:700;
    min-height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    word-break:break-word;
}

button{
    border:none;
    background:#16a34a;
    color:white;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    opacity:.9;
}

.info{
    margin-top:20px;
    color:#94a3b8;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    padding:12px 18px;
    border-radius:8px;
    display:none;
}
</style>
</head>
<body>

<div class="card">

    <h1>🎬 Random Movie</h1>

    <div id="movie" class="movie">
        Loading...
    </div>

    <button onclick="copyAndNext()">
        📋 随机复制
    </button>

    <div class="info" id="info">
        正在加载电影库...
    </div>

</div>

<div id="toast" class="toast"></div>

<script>

const DATA_URL =
"https://raw.githubusercontent.com/prust/wikipedia-movie-data/master/movies.json";

let movies = [];
let currentMovie = "";

let recent =
JSON.parse(
    localStorage.getItem("recent_movies")
    || "[]"
);

function showToast(text){

    const toast =
        document.getElementById("toast");

    toast.innerText = text;
    toast.style.display = "block";

    setTimeout(()=>{
        toast.style.display = "none";
    },1200);
}

function saveRecent(){

    localStorage.setItem(
        "recent_movies",
        JSON.stringify(recent)
    );
}

function getRandomMovie(){

    const recentSet =
        new Set(recent);

    let pool =
        movies.filter(
            movie => !recentSet.has(movie)
        );

    if(pool.length === 0){

        recent = [];

        saveRecent();

        pool = movies;
    }

    const movie =
        pool[
            Math.floor(
                Math.random() * pool.length
            )
        ];

    return movie;
}

function showNextMovie(){

    currentMovie =
        getRandomMovie();

    document.getElementById("movie")
    .innerText =
        currentMovie;
}

async function copyAndNext(){

    if(!currentMovie) return;

    await navigator.clipboard.writeText(
        currentMovie
    );

    recent.push(currentMovie);

    if(recent.length > 50){
        recent.shift();
    }

    saveRecent();

    showToast(
        "已复制: " + currentMovie
    );

    showNextMovie();

    document.getElementById("info")
    .innerText =
        `电影库: ${movies.length.toLocaleString()} 部 | 最近50次不重复`;
}

async function init(){

    try{

        const res =
            await fetch(DATA_URL);

        const data =
            await res.json();

        movies =
            [...new Set(
                data.map(
                    m => m.title
                )
            )];

        document.getElementById("info")
        .innerText =
            `电影库: ${movies.length.toLocaleString()} 部`;

        showNextMovie();

    }catch(err){

        document.getElementById("movie")
        .innerText =
            "加载失败";

        console.error(err);
    }
}

init();

</script>

</body>
</html>
