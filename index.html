<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">


<title>
🎬 随机热门电影
</title>


<style>

body{

margin:0;

background:#0f172a;

color:white;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}


.box{

max-width:600px;

width:100%;

background:#1e293b;

padding:35px;

border-radius:20px;

text-align:center;

}



h1{

margin-bottom:30px;

}



.movie{

font-size:36px;

font-weight:bold;

min-height:100px;

display:flex;

align-items:center;

justify-content:center;

word-break:break-word;

}



button{

border:0;

border-radius:12px;

padding:15px 30px;

font-size:18px;

cursor:pointer;

background:#22c55e;

color:white;

}



button:hover{

opacity:.8;

}



.info{

margin-top:20px;

color:#94a3b8;

font-size:14px;

}


.history{

margin-top:25px;

text-align:left;

}



.item{

padding:8px;

border-bottom:1px solid #334155;

color:#cbd5e1;

}


.toast{

position:fixed;

bottom:30px;

left:50%;

transform:translateX(-50%);

background:#22c55e;

padding:12px 20px;

border-radius:10px;

display:none;

}



</style>


</head>


<body>


<div class="box">


<h1>
🎬 随机热门电影
</h1>


<div id="movie"
class="movie">

加载中...

</div>


<button onclick="copyMovie()">

📋 随机复制

</button>


<div class="info"
id="info">

</div>


<div class="history">

<h3>
最近复制
</h3>


<div id="history">

</div>


</div>


</div>


<div id="toast"
class="toast">

</div>


<script>


let movies=[];

let current="";


// 保存最近复制记录

let history =
JSON.parse(
localStorage.getItem(
"movie_history"
)
||
"[]"
);


// GitHub Raw 地址

const MOVIE_URL =

"https://raw.githubusercontent.com/pingmike2/movie-random/main/movies.json";




// 初始化

async function init(){


try{


let res =

await fetch(

MOVIE_URL

+
"?v="

+
Date.now()

);



if(!res.ok){

throw new Error(
"HTTP "
+
res.status
);

}



movies =

await res.json();



if(!movies.length){

throw new Error(
"Movie list empty"
);

}



next();

update();



}

catch(e){


console.error(e);


document
.getElementById("movie")
.innerText =

"电影库加载失败";


document
.getElementById("info")
.innerText =

"请检查 GitHub 文件";


}


}




// 随机下一部

function next(){



let pool =

movies.filter(

m=>

!history.includes(m)

);



if(pool.length===0){


history=[];


pool=movies;


}



current =

pool[

Math.floor(

Math.random()*pool.length

)

];



document
.getElementById("movie")
.innerText =

current;


}





// 复制并切换

async function copyMovie(){


if(!current){

return;

}



try{


await navigator.clipboard.writeText(

current

);



history.push(

current

);



if(history.length>50){


history.shift();


}



localStorage.setItem(

"movie_history",

JSON.stringify(history)

);



toast(

"已复制：" + current

);



next();


update();



}

catch(e){


toast(

"复制失败"

);


}



}





// 更新显示

function update(){



document
.getElementById("info")
.innerText =

"电影数量："

+
movies.length;



let box =

document.getElementById(

"history"

);



box.innerHTML="";



history

.slice(-10)

.reverse()

.forEach(

m=>{


let div =

document.createElement(

"div"

);



div.className="item";


div.innerText=m;



box.appendChild(div);



}

);



}




// 提示

function toast(text){



let t =

document.getElementById(

"toast"

);



t.innerText=text;



t.style.display="block";



setTimeout(()=>{


t.style.display="none";


},1500);



}





init();



</script>


</body>

</html>
