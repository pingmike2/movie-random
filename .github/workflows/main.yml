name: Update TMDB Movies

on:
  schedule:
    # 北京时间每天10点
    - cron: "0 2 * * *"

  workflow_dispatch:


permissions:
  contents: write


jobs:

  update-movies:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install Python
        run: |
          python3 -m pip install requests


      - name: Fetch TMDB Movies

        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

        run: |

          python3 << 'PYTHON'

          import os
          import json
          import requests


          TOKEN = os.environ.get("TMDB_TOKEN")


          if not TOKEN:
              raise Exception(
                  "TMDB_TOKEN missing"
              )


          headers = {

              "Authorization":
                  f"Bearer {TOKEN}",

              "accept":
                  "application/json"

          }



          urls = [

              # 周热门
              "https://api.themoviedb.org/3/trending/movie/week?language=zh-CN&page=1",


              # 热门电影
              "https://api.themoviedb.org/3/movie/popular?language=zh-CN&page=1",

              "https://api.themoviedb.org/3/movie/popular?language=zh-CN&page=2",

              "https://api.themoviedb.org/3/movie/popular?language=zh-CN&page=3",


              # 高分电影
              "https://api.themoviedb.org/3/movie/top_rated?language=zh-CN&page=1",

              "https://api.themoviedb.org/3/movie/top_rated?language=zh-CN&page=2",


              # 即将上映
              "https://api.themoviedb.org/3/movie/upcoming?language=zh-CN&page=1"

          ]



          movies = []



          for url in urls:


              print("================")
              print(url)


              try:

                  r = requests.get(
                      url,
                      headers=headers,
                      timeout=20
                  )


                  print(
                      "Status:",
                      r.status_code
                  )


                  if r.status_code != 200:

                      print(
                          r.text
                      )

                      continue



                  data = r.json()


                  for item in data.get(
                      "results",
                      []
                  ):


                      title = (

                          item.get("title")

                          or

                          item.get("original_title")

                      )


                      if title:

                          movies.append(
                              title.strip()
                          )


              except Exception as e:

                  print(
                      "Request error:",
                      e
                  )



          # 去重

          movies = list(
              dict.fromkeys(
                  movies
              )
          )



          print(
              "Total movies:",
              len(movies)
          )



          if len(movies) == 0:

              raise Exception(
                  "TMDB returned zero movies"
              )



          with open(
              "movies.json",
              "w",
              encoding="utf-8"
          ) as f:

              json.dump(
                  movies,
                  f,
                  ensure_ascii=False,
                  indent=2
              )


          PYTHON



      - name: Check movies.json

        run: |

          echo "Preview:"
          head -30 movies.json



      - name: Commit update

        run: |

          git config user.name \
          "github-actions[bot]"


          git config user.email \
          "41898282+github-actions[bot]@users.noreply.github.com"


          git add movies.json


          git commit \
          -m "Update TMDB movies" || echo "No changes"


          git push